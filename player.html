<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="screen-orientation" content="auto">
    <title>PlusTV - Video Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; height: 100vh; overflow: hidden; }

        .player-content-wrapper { display: flex; height: 100vh; }

        /* --- SİDEBAR 220PX AYARI --- */
        .player-sidebar {
            width: 220px !important;
            background: #111;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #222;
        }

        .channels-sidebar-list {
            flex-grow: 1;
            overflow-y: auto;
        }

        /* --- KATEGORİLER SOLA YANAŞTIRMA --- */
        .player-categories-container {
            display: flex !important;
            justify-content: flex-start !important;
            gap: 15px;
            padding: 15px;
            overflow-x: auto;
        }

        .category-card {
            cursor: pointer;
            text-align: center;
            min-width: 60px;
        }

        /* --- VİDEO VE KONTROL --- */
        .player-main { flex-grow: 1; display: flex; flex-direction: column; }
        .video-container-player { flex-grow: 1; position: relative; background: #000; }
        
        #videoControlsBar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            background-color: #111;
            border-top: 1px solid #222;
        }

        .player-nav-btn {
            background: #222;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
        }

        #fullscreenBtn { 
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            border: none;
            padding: 10px 30px;
            color: #fff;
            border-radius: 6px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="player-content-wrapper">
        <aside class="player-sidebar">
            <div class="sidebar-header">
                <h3>Kanallar</h3>
            </div>
            <div class="channels-sidebar-list" id="channelsSidebarList">
                </div>
        </aside>

        <main class="player-main">
            <section class="player-categories-section">
                <div class="player-categories-container">
                    <div class="category-card">📺 Tümü</div>
                    <div class="category-card">🌐 Ulusal</div>
                </div>
            </section>

            <div class="video-container-player" id="videoContainerPlayer">
                <video id="videoPlayer" class="video-player" autoplay playsinline></video>
            </div>

            <div id="videoControlsBar">
                <button class="player-nav-btn" onclick="changeChannel(-1)">I⏮ Geri</button>
                <button class="player-nav-btn" id="fullscreenBtn" onclick="toggleFullscreen()">⛶ Tam Ekran</button>
                <button class="player-nav-btn" onclick="changeChannel(1)">İleri ⏭I</button>
            </div>
        </main>
    </div>

    <script>
        function toggleFullscreen() {
            const el = document.getElementById("videoContainerPlayer");
            if (!document.fullscreenElement) {
                el.requestFullscreen().catch(err => alert(err.message));
            } else {
                document.exitFullscreen();
            }
        }

        function changeChannel(direction) {
            const listContainer = document.getElementById('channelsSidebarList');
            if (!listContainer) return;
            const channels = Array.from(listContainer.children);
            if (channels.length === 0) return;
            let currentIndex = channels.findIndex(ch => ch.classList.contains('active'));
            let nextIndex = (currentIndex === -1) ? 0 : currentIndex + direction;
            if (nextIndex >= channels.length) nextIndex = 0;
            if (nextIndex < 0) nextIndex = channels.length - 1;
            channels[nextIndex].click();
            channels[nextIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>
</html>
