<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlusTV - Video Player</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        /* --- TAM EKRAN DÜZENLEMELERİ --- */
        
        /* Tam ekran moduna girildiğinde sidebar ve kategorileri tamamen gizle */
        :fullscreen .player-sidebar,
        :fullscreen .player-categories-section {
            display: none !important;
        }
        
        /* Tam ekrandayken ana alanı genişlet */
        :fullscreen .player-main {
            width: 100% !important;
            height: 100vh !important;
            position: absolute !important;
            top: 0;
            left: 0;
            background: #000;
        }

        /* Tam ekran modunda video kapsayıcısını tam doldur */
        :fullscreen .video-container-player {
            height: calc(100vh - 60px) !important;
        }

        /* Kontrol barını tam ekranın altına sabitle */
        :fullscreen #videoControlsBar {
            position: absolute;
            bottom: 0;
            width: 100%;
            z-index: 9999;
        }

        /* Mevcut sitiliniz: Sidebar ve diğer elementleriniz buraya gelecek */
        .player-content-wrapper { display: flex; width: 100%; height: 100vh; }
        .player-sidebar { width: 250px; background: #111; }
        .player-main { flex: 1; display: flex; flex-direction: column; }
        .video-container-player { flex: 1; position: relative; background: #000; }
    </style>
</head>
<body>
    <div class="player-page" id="wholePlayerPage"> 
        <div class="player-content-wrapper">
            <aside class="player-sidebar">
                </aside>

            <main class="player-main" id="playerMain">
                <section class="player-categories-section">
                    </section>

                <div class="video-container-player" id="videoContainerPlayer">
                    <video id="videoPlayer" class="video-player" autoplay playsinline></video>
                </div>

                <div id="videoControlsBar">
                    <button class="player-nav-btn" onclick="changeChannel(-1)">Geri</button>
                    <button class="player-nav-btn" id="fullscreenBtn" onclick="toggleFullscreen()">Tam Ekran</button>
                    <button class="player-nav-btn" onclick="changeChannel(1)">İleri</button>
                </div>
            </main>
        </div>
    </div>

    <script>
        function toggleFullscreen() {
            // Sadece player-main kısmını (video + kontroller) tam ekran yapıyoruz.
            // Sidebar ve kategoriler otomatik olarak dışarıda kalacak ve CSS ile gizlenecektir.
            const playerMain = document.getElementById("playerMain");
            
            if (!document.fullscreenElement) {
                if (playerMain.requestFullscreen) {
                    playerMain.requestFullscreen();
                } else if (playerMain.webkitRequestFullscreen) {
                    playerMain.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        }

        function changeChannel(direction) {
            const listContainer = document.getElementById('channelsSidebarList');
            if (!listContainer) return;
            const channels = Array.from(listContainer.children);
            let currentIndex = channels.findIndex(ch => ch.classList.contains('active'));
            let nextIndex = currentIndex + direction;
            if (nextIndex >= channels.length) nextIndex = 0;
            if (nextIndex < 0) nextIndex = channels.length - 1;
            channels[nextIndex].click();
        }
    </script>
</body>
</html>
