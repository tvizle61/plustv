<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="screen-orientation" content="auto">
    <title>PlusTV - Video Player</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        /* --- 1. SİDEBAR 220PX SABİTLEME --- */
        .player-sidebar {
            width: 220px !important;
            min-width: 220px !important;
        }

        /* --- 2. KATEGORİLERİ SOLA YANAŞTIRMA --- */
        .player-categories-container {
            justify-content: flex-start !important;
            padding-left: 20px !important; /* Biraz boşluk kalsın diye */
        }

        /* --- Orijinal CSS'ini bozmamak için diğerleri aynı kalıyor --- */
        #videoControlsBar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            background-color: #111;
            border-top: 1px solid #222;
            width: 100%;
        }

        .player-nav-btn {
            background: #222;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 10px 25px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        #fullscreenBtn { 
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            border: 1px solid rgba(255,255,255,0.2); 
            color: #fff; 
            padding: 14px 40px;
            font-size: 17px;
            font-weight: 500;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="player-page" id="wholePlayerPage"> 
        <div class="player-content-wrapper">
            <aside class="player-sidebar">
                <div class="sidebar-header">
                    <button class="back-btn" id="backBtn" title="Ana Sayfaya Dön">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        <span>Geri</span>
                    </button>
                    <h3 id="sidebarCategoryTitle">Kanallar</h3>
                </div>
                <div class="sidebar-tabs">
                    <button class="tab-btn active" data-tab="channels">Kanallar</button>
                    <button class="tab-btn" data-tab="favorites">⭐ Favoriler</button>
                </div>
                <div class="channels-sidebar-list" id="channelsSidebarList"></div>
            </aside>

            <main class="player-main">
                <section class="player-categories-section">
                    <div class="player-categories-container">
                        <div class="category-card" data-category="all">
                            <div class="category-icon">📺</div>
                            <div class="category-name">Tümü</div>
                        </div>
                    </div>
                </section>

                <div class="video-container-player" id="videoContainerPlayer">
                    <video id="videoPlayer" class="video-player" autoplay playsinline title="PlusTV"></video>
                </div>

                <div id="videoControlsBar">
                    <button class="player-nav-btn" onclick="changeChannel(-1)"><span>I⏮</span> Geri</button>
                    <button class="player-nav-btn" id="fullscreenBtn" onclick="toggleFullscreen()"><span>⛶</span> Tam Ekran</button>
                    <button class="player-nav-btn" onclick="changeChannel(1)">İleri <span>⏭I</span></button>
                </div>
            </main>
        </div>
    </div>

    <script src="player.js"></script>
    <script>
        function toggleFullscreen() {
            const playerElement = document.getElementById("videoContainerPlayer");
            if (!document.fullscreenElement) {
                playerElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function changeChannel(direction) {
            const listContainer = document.getElementById('channelsSidebarList');
            if (!listContainer) return;
            const channels = Array.from(listContainer.children);
            let currentIndex = channels.findIndex(ch => ch.classList.contains('active'));
            let nextIndex = currentIndex + direction;
            if (nextIndex >= channels.length) nextIndex = 0;
            if (nextIndex < 0) nextIndex = channels.length - 1;
            channels[nextIndex].click();
            channels[nextIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>
</html>
