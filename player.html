<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="screen-orientation" content="auto">
    <title>PlusTV - Video Player</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        /* Oynatıcı içi özel ek CSS alanları - Çakışmaları önlemek için minimal tutulmuştur */
        .video-container-player {
            position: relative;
            flex-grow: 1;
            background: #000;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .video-wrapper-inner {
            position: relative;
            width: 100%;
            height: calc(100% - 44px); 
            background: #000;
        }

        .video-player, 
        .iframe-player,
        #ytActualPlayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            z-index: 1;
        }

        /* Orijinal büyük alt bar ve buton tasarımları */
        #videoControlsBar {
            position: relative;
            width: 100%;
            height: 44px; 
            background: #111111;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 10px;
            padding: 0 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            z-index: 9999;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        .player-nav-btn {
            background: #2a2a2a;
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            padding: 0 20px;
            min-width: 100px;
            font-size: 14px; 
            font-weight: 600;
            border-radius: 6px;         
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;                    
            user-select: none;
            height: 34px; 
            line-height: 1;
            white-space: nowrap;
        }

        #fullscreenBtn { 
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            border: 1px solid rgba(255,255,255,0.2); 
            padding: 0 24px;
            min-width: 140px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }

        .video-placeholder-player {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
        }
        
        .placeholder-content h2 { margin: 10px 0 5px 0; font-size: 18px; }
        .placeholder-content p { margin: 0; opacity: 0.7; font-size: 13px; }
        .placeholder-content .brand-name { margin-top: 15px; font-weight: bold; color: #007bff; }
        .placeholder-icon { font-size: 40px; }

        .loading-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 4;
            color: #fff;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="player-page">
        <div class="player-content-wrapper">
            <!-- Sidebar Yapısı Orijinal Halleriyle Bırakıldı -->
            <aside class="player-sidebar">
                <div class="sidebar-header">
                    <button class="back-btn" id="backBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        <span>Geri</span>
                    </button>
                    <h3 id="sidebarCategoryTitle">Kanallar</h3>
                    <button class="zoom-toggle-btn" id="zoomToggleBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                        </svg>
                    </button>
                </div>
                
                <div class="sidebar-tabs">
                    <button class="tab-btn active" data-tab="channels">Kanallar</button>
                    <button class="tab-btn" data-tab="favorites">⭐ Favoriler</button>
                </div>
                
                <div class="channels-sidebar-list" id="channelsSidebarList">
                    <!-- player.js kanalları buraya enjekte edecek -->
                </div>
            </aside>

            <main class="player-main">
                <!-- Üst Kategoriler - player.js kontrolündedir -->
                <section class="player-categories-section">
                    <div class="player-categories-container">
                        <div class="category-card active" data-category="all">
                            <div class="category-icon">📺</div>
                            <div class="category-name">Tümü</div>
                        </div>
                    </div>
                </section>

                <div class="video-container-player" id="videoContainerPlayer">
                    <div class="video-wrapper-inner">
                        <div class="video-placeholder-player" id="videoPlaceholderPlayer">
                            <div class="placeholder-content">
                                <div class="placeholder-icon">📺</div>
                                <h2>Bir Kanal Seçin</h2>
                                <p>Sol taraftaki listeden bir kanal seçin</p>
                                <p class="brand-name">61 BYD 61</p>
                            </div>
                        </div>
                        
                        <div class="loading-overlay" id="loadingPlayer">
                            <div class="spinner"></div>
                            <p>Yükleniyor...</p>
                        </div>
                        
                        <!-- Video ve Akış Elementleri -->
                        <video id="videoPlayer" class="video-player" autoplay playsinline></video>
                        <iframe id="iframePlayer" class="iframe-player" frameborder="0" style="display: none; pointer-events: none; opacity: 0;"></iframe>
                        <div id="ytActualPlayer" style="display: none;"></div>
                    </div>
                
                    <!-- Büyük Alt Bar Kontrolleri -->
                    <div id="videoControlsBar">
                        <button class="player-nav-btn" onclick="changeChannel(-1)">
                            <span>I&#x23EE;</span> Geri
                        </button>
                        
                        <button class="player-nav-btn" id="fullscreenBtn" onclick="toggleFullscreen()">
                            <span>&#x26F6;</span> Tam Ekran
                        </button>
                        
                        <button class="player-nav-btn" onclick="changeChannel(1)">
                            İleri <span>&#x23ED;I</span>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Orijinal Script Yüklemesi -->
    <script src="player.js"></script>

    <!-- Güvenli Medya Köprüsü Motoru -->
    <script>
        let ytPlayerInstance = null;
        let hlsInstance = null;
        
        const fakeIframe = document.getElementById('iframePlayer');
        const realYtDiv = document.getElementById('ytActualPlayer');
        const normalVideoPlayer = document.getElementById('videoPlayer');
        const loadingOverlay = document.getElementById('loadingPlayer');
        const placeholderPlayer = document.getElementById('videoPlaceholderPlayer');

        function extractYouTubeId(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function playM3u8Stream(url) {
            if (url.startsWith('https://0e770a63.ucomist.net')) {
                url = url.replace('https://', 'http://');
            } else if (url.includes('ucomist.net') && !url.startsWith('http://')) {
                url = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
            }

            if (placeholderPlayer) placeholderPlayer.style.display = 'none';
            if (loadingOverlay) loadingOverlay.style.display = 'flex';

            if (hlsInstance) { 
                try { hlsInstance.destroy(); } catch(e) {} 
            }

            if (Hls.isSupported()) {
                hlsInstance = new Hls({
                    maxBufferLength: 10,
                    maxMaxBufferLength: 20,
                    xhrSetup: function (xhr) { xhr.withCredentials = false; }
                });
                
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(normalVideoPlayer);
                
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function () {
                    if (loadingOverlay) loadingOverlay.style.display = 'none';
                    normalVideoPlayer.play().catch(e => console.log(e));
                });

                hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        if (loadingOverlay) loadingOverlay.style.display = 'none';
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            hlsInstance.startLoad();
                        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                            hlsInstance.recoverMediaError();
                        } else {
                            normalVideoPlayer.src = url;
                        }
                    }
                });
            } else if (normalVideoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                normalVideoPlayer.src = url;
                normalVideoPlayer.addEventListener('loadedmetadata', function () {
                    if (loadingOverlay) loadingOverlay.style.display = 'none';
                    normalVideoPlayer.play().catch(e => console.log(e));
                }, { once: true });
            }
        }

        // MutationObserver Köprüsü - player.js'in DOM manipülasyonlarını yakalar
        const bridgeObserver = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.type === "attributes" && mutation.attributeName === "src") {
                    const interceptedUrl = fakeIframe.getAttribute('src');
                    if (!interceptedUrl || interceptedUrl === 'about:blank') return;

                    const ytId = extractYouTubeId(interceptedUrl);
                    
                    if (ytId) {
                        normalVideoPlayer.pause();
                        normalVideoPlayer.style.display = 'none';
                        fakeIframe.style.display = 'none';
                        
                        bridgeObserver.disconnect();
                        fakeIframe.setAttribute('src', 'about:blank');
                        bridgeObserver.observe(fakeIframe, { attributes: true });

                        realYtDiv.style.display = 'block';
                        playWithYouTubeAPI(ytId);
                    } else if (interceptedUrl.includes('.m3u8') || interceptedUrl.startsWith('http')) {
                        fakeIframe.style.display = 'none';
                        
                        bridgeObserver.disconnect();
                        fakeIframe.setAttribute('src', 'about:blank');
                        bridgeObserver.observe(fakeIframe, { attributes: true });

                        realYtDiv.style.display = 'none';
                        normalVideoPlayer.style.display = 'block';
                        
                        playM3u8Stream(interceptedUrl);
                    }
                }
            });
        });

        bridgeObserver.observe(fakeIframe, { attributes: true });

        function playWithYouTubeAPI(videoId) {
            if (placeholderPlayer) placeholderPlayer.style.display = 'none';
            if (loadingOverlay) loadingOverlay.style.display = 'none';
            
            if (ytPlayerInstance && typeof ytPlayerInstance.loadVideoById === 'function') {
                ytPlayerInstance.loadVideoById({ videoId: videoId, startSeconds: 0 });
                setTimeout(() => {
                    try { ytPlayerInstance.playVideo(); } catch(e) {}
                }, 300);
            } else {
                ytPlayerInstance = new YT.Player('ytActualPlayer', {
                    height: '100%', width: '100%', videoId: videoId,
                    playerVars: { 'autoplay': 1, 'playsinline': 1, 'controls': 1, 'rel': 0, 'mute': 1 },
                    events: {
                        'onReady': function(event) {
                            event.target.playVideo();
                            setTimeout(() => {
                                try { event.target.unMute(); event.target.setVolume(100); } catch(e) {}
                            }, 500);
                        },
                        'onStateChange': function(event) {
                            if (event.data === YT.PlayerState.ENDED) changeChannel(1);
                        }
                    }
                });
            }
        }

        normalVideoPlayer.addEventListener('ended', function() {
            changeChannel(1);
        });

        function toggleFullscreen() {
            const playerElement = document.getElementById("videoContainerPlayer");
            if (!playerElement) return;
            if (!document.fullscreenElement) {
                playerElement.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }

        function changeChannel(direction) {
            const listContainer = document.getElementById('channelsSidebarList');
            if (!listContainer) return;
            // Farklı template yapılarında item sınıfını genel yakalamak için seçici genişletildi
            const channelsList = Array.from(listContainer.querySelectorAll('.channel-sidebar-item, .channel-item, [class*="channel"]'));
            if (channelsList.length === 0) return;
            
            let currentIndex = channelsList.findIndex(ch => ch.classList.contains('active'));
            let nextIndex = currentIndex + direction;
            
            if (nextIndex >= channelsList.length) nextIndex = 0;
            else if (nextIndex < 0) nextIndex = channelsList.length - 1;
            
            const targetChannel = channelsList[nextIndex];
            if (targetChannel) {
                targetChannel.click();
                targetChannel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        document.getElementById('backBtn')?.addEventListener('click', function() {
            window.location.href = 'index.html';
        });
        
        document.getElementById('zoomToggleBtn')?.addEventListener('click', toggleFullscreen);
    </script>
</body>
</html>
