<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="screen-orientation" content="auto">
    <title>PlusTV - Video Player</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        /* --- SIDEBAR AYARLARI (220px) --- */
        .player-sidebar {
            width: 220px;
            display: flex;
            flex-direction: column;
            background: #111;
            border-right: 1px solid #222;
            height: 100vh;
            flex-shrink: 0;
        }

        .channels-sidebar-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 6px;
        }

        /* --- KANAL LİSTESİ (MİNİ BOYUT) --- */
        #channelsSidebarList > * {
            padding: 4px 6px !important;
            margin-bottom: 3px !important;
            min-height: 32px !important;
            max-height: 32px !important;
            border-radius: 4px !important;
            display: flex !important;
            align-items: center !important;
            gap: 6px !important;
        }

        #channelsSidebarList > * img,
        #channelsSidebarList > * .channel-logo,
        #channelsSidebarList > * [class*="logo"] {
            width: 20px !important;
            height: 20px !important;
            min-width: 20px !important;
            border-radius: 3px !important;
            object-fit: contain !important;
        }

        #channelsSidebarList > * .channel-name,
        #channelsSidebarList > * h4,
        #channelsSidebarList > * span,
        #channelsSidebarList > * div {
            font-size: 10px !important;
            font-weight: 500 !important;
            line-height: 1.2 !important;
            white-space: nowrap !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
        }

        #channelsSidebarList > * p,
        #channelsSidebarList > * small,
        #channelsSidebarList > * .channel-category {
            font-size: 8px !important;
            opacity: 0.6;
            margin: 0 !important;
            display: block !important;
        }

        #channelsSidebarList > * .fav-btn,
        #channelsSidebarList > * .star-icon,
        #channelsSidebarList > * svg {
            transform: scale(0.75) !important;
            margin-left: auto !important;
        }

        /* --- ÜST KATEGORİ AYARLARI --- */
        .player-categories-section {
            background: #111; 
            border-bottom: 1px solid #222;
            width: 100%;
        }

        .player-categories-container {
            display: flex;
            justify-content: flex-start !important; 
            gap: 5px !important;
            padding: 5px 10px !important;
            flex-wrap: nowrap !important;    
            overflow-x: auto;                
        }

        .player-categories-container div.category-card,
        .player-categories-container [class*="category"],
        .player-categories-container .active,
        .player-categories-container .selected {
            width: 40px !important;
            max-width: 40px !important;
            min-width: 40px !important;
            height: auto !important;
            padding: 4px 1px !important;
            box-sizing: border-box !important;
            border-radius: 4px !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 2px !important;
            flex-shrink: 0 !important;
            overflow: visible !important;
        }

        .category-icon, [class*="category-icon"] {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            width: 15px !important;
            height: 15px !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        .category-icon img, .category-icon svg, .category-icon i, .category-icon span {
            width: 15px !important;
            height: 15px !important;
            font-size: 15px !important;
            object-fit: contain !important;
        }

        .category-name {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            font-size: 7px !important;
            font-weight: 500 !important;
            color: #ffffff !important;
            white-space: nowrap !important;   
            line-height: 1 !important;       
            text-align: center !important;
        }

        /* --- VİDEO ALANI ANA AYARLARI --- */
        .player-main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            height: 100vh;
        }

        /* TAM EKRAN YAPILACAK ANA KUTU */
        #videoContainerPlayer {
            position: relative !important;
            flex-grow: 1;
            background: #000;
            display: flex !important;
            flex-direction: column !important;
            height: 100% !important;
            overflow: hidden !important;
        }

        /* VİDEONUN KENDİ KUTUSU */
        .video-wrapper-inner {
            position: relative !important;
            width: 100% !important;
            height: calc(100% - 28px) !important; /* Bar inceldiği için (28px) video alanı maksimuma çıkarıldı */
            background: #000;
        }

        .video-player, 
        .iframe-player {
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            object-fit: fill !important;
            z-index: 1 !important;
        }

        /* --- ALTTAN VE ÜSTTEN İYİCE İNCELTİLMİŞ ŞERİT BAR --- */
        #videoControlsBar {
            position: relative !important;
            width: 100% !important;
            height: 28px !important;               /* Yükseklik 38px'den 28px'e indirilerek incecik yapıldı */
            background: #111111 !important;
            display: flex !important;
            justify-content: flex-start !important;
            align-items: center !important;
            gap: 6px !important;                   /* Butonlar arası boşluk biraz daha daraltıldı */
            padding: 0 10px !important;            /* İç dikey boşluk sıfırlandı, sağ sol ayarlandı */
            border-top: 1px solid rgba(255, 255, 255, 0.12) !important;
            z-index: 999999 !important;
            box-sizing: border-box !important;
            flex-shrink: 0 !important;
        }

        /* --- DİKEYDE MAKSİMUM DARALTILMIŞ MİNİ BUTONLAR --- */
        .player-nav-btn {
            background: #222 !important;
            border: 1px solid rgba(255,255,255,0.18) !important;
            color: #fff !important;
            padding: 0 8px !important;             /* Yatay genişlik de kibarlaştırıldı */
            font-size: 10px !important;            /* İnce barda taşmaması için yazı 10px yapıldı */
            font-weight: 500 !important;
            border-radius: 3px !important;          
            cursor: pointer;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 3px !important;                    
            user-select: none;
            height: 20px !important;               /* Buton yüksekliği alttan ve üstten kısılarak 20px yapıldı */
            line-height: 1 !important;
        }

        /* İNCE TAM EKRAN BUTONU */
        #fullscreenBtn { 
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%) !important;
            border: 1px solid rgba(255,255,255,0.2) !important; 
            padding: 0 12px !important;            
            box-shadow: 0 1px 4px rgba(0,0,0,0.4) !important;
        }

        .player-content-wrapper {
            display: flex;
            flex-direction: row;
            height: 100vh;
        }

        #videoPlaceholderPlayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div class="player-page">
        <div class="player-content-wrapper">
            <aside class="player-sidebar">
                <div class="sidebar-header">
                    <button class="back-btn" id="backBtn" title="Ana Sayfaya Dön">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        <span>Geri</span>
                    </button>
                    <h3 id="sidebarCategoryTitle">Kanallar</h3>
                    <button class="zoom-toggle-btn" id="zoomToggleBtn" title="Tam ekran">
                        <svg class="fullscreen-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                        </svg>
                    </button>
                </div>
                
                <div class="sidebar-tabs">
                    <button class="tab-btn active" data-tab="channels">Kanallar</button>
                    <button class="tab-btn" data-tab="favorites">⭐ Favoriler</button>
                </div>
                
                <div class="channels-sidebar-list" id="channelsSidebarList">
                </div>
            </aside>

            <main class="player-main">
                <section class="player-categories-section">
                    <div class="player-categories-container">
                        <div class="category-card" data-category="all">
                            <div class="category-icon">📺</div>
                            <div class="category-name">Tümü</div>
                        </div>
                    </div>
                </section>

                <div class="video-container-player" id="videoContainerPlayer">
                    <div class="video-wrapper-inner">
                        <div class="video-placeholder-player" id="videoPlaceholderPlayer">
                            <div class="placeholder-content">
                                <div class="placeholder-icon">📺</div>
                                <h2>Bir Kanal Seçin</h2>
                                <p>Sol taraftaki listeden bir kanal seçin</p>
                                <p class="brand-name">61 BYD 61</p>
                            </div>
                        </div>
                        
                        <div class="loading-overlay" id="loadingPlayer">
                            <div class="spinner"></div>
                            <p>Yükleniyor...</p>
                        </div>
                        
                        <video id="videoPlayer" class="video-player" autoplay playsinline title="PlusTV"></video>
                        
                        <div id="iframePlayer" class="iframe-player" style="display: none;"></div>
                    </div>
                
                    <div id="videoControlsBar">
                        <button class="player-nav-btn" onclick="changeChannel(-1)">
                            <span>I⏮</span> Geri
                        </button>
                        
                        <button class="player-nav-btn" id="fullscreenBtn" onclick="toggleFullscreen()">
                            <span>⛶</span> Tam Ekran
                        </button>
                        
                        <button class="player-nav-btn" onclick="changeChannel(1)">
                            İleri <span>⏭I</span>
                        </button>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <script src="player.js"></script>
    <script>
        // --- YouTube API ve Otomatik Atlatma Entegrasyonu ---
        let ytPlayer = null;

        // YouTube API hazır olduğunda tetiklenir
        function onYouTubeIframeAPIReady() {
            // İlk başta player nesnesini kuruyoruz ancak boş bırakıyoruz.
            // player.js dosyanız iframePlayer nesnesinin src'sini değiştirmek yerine 
            // ytPlayer.loadVideoById() kullanırsa mükemmel çalışır.
            // Mevcut yapıyı bozmamak için bir MutationObserver (Değişim gözlemcisi) ekliyoruz.
        }

        // İnceleme Alanı: iframePlayer elementine src atandığında bunu yakalayıp API'ye bağlayacağız
        const iframeTarget = document.getElementById('iframePlayer');
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.type === "attributes" && mutation.attributeName === "src") {
                    const currentSrc = iframeTarget.getAttribute('src');
                    if (currentSrc && currentSrc.includes('youtube.com')) {
                        // YouTube video ID'sini linkten ayıklayalım
                        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                        const match = currentSrc.match(regExp);
                        if (match && match[2].length == 11) {
                            const videoId = match[2];
                            initYouTubePlayer(videoId);
                        }
                    }
                }
            });
        });

        // iframePlayer elementinin nitelik değişimlerini dinle
        observer.observe(iframeTarget, { attributes: true });

        function initYouTubePlayer(videoId) {
            if (ytPlayer) {
                try {
                    ytPlayer.loadVideoById(videoId);
                    return;
                } catch(e) { console.log("YT Player hatası, yeniden oluşturuluyor...", e); }
            }

            // Eğer player nesnesi yoksa veya hata verdiyse sıfırdan kur
            ytPlayer = new YT.Player('iframePlayer', {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: {
                    'autoplay': 1,
                    'playsinline': 1,
                    'controls': 1,
                    'rel': 0
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        // Video durum değişikliklerini dinleyen fonksiyon
        function onPlayerStateChange(event) {
            // YT.PlayerState.ENDED değeri 0'dır (Video bittiğinde tetiklenir)
            if (event.data === YT.PlayerState.ENDED) {
                console.log("YouTube videosu bitti. Sonraki kanala geçiliyor...");
                changeChannel(1); // Sonraki kanala atla
            }
        }

        // Normal MP4/HLS videolar bittiğinde sonraki kanala geçmesi için standart dinleyici
        document.getElementById('videoPlayer').addEventListener('ended', function() {
            console.log("Normal/HLS video bitti. Sonraki kanala geçiliyor...");
            changeChannel(1);
        });

        // --- Mevcut Fonksiyonlarınız ---
        function toggleFullscreen() {
            const playerElement = document.getElementById("videoContainerPlayer");
            if (!playerElement) return;
            if (!document.fullscreenElement) {
                playerElement.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }

        function changeChannel(direction) {
            const listContainer = document.getElementById('channelsSidebarList');
            if (!listContainer) return;
            const channels = Array.from(listContainer.children);
            if (channels.length === 0) return;
            let currentIndex = channels.findIndex(ch => ch.classList.contains('active'));
            let nextIndex = currentIndex + direction;
            if (nextIndex >= channels.length) nextIndex = 0;
            else if (nextIndex < 0) nextIndex = channels.length - 1;
            const targetChannel = channels[nextIndex];
            if (targetChannel) {
                targetChannel.click();
                targetChannel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }
    </script>
</body>
</html>
