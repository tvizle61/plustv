<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="screen-orientation" content="auto">
    <title>PlusTV - Video Player</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        .player-sidebar {
            width: 220px;
            display: flex;
            flex-direction: column;
            background: #111;
            border-right: 1px solid #222;
            height: 100vh;
            flex-shrink: 0;
        }

        /* --- KONTROL BARINI KAPSAYICI İÇİNDE SABİTLEYELİM --- */
        #videoContainerPlayer {
            position: relative;
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        #videoControlsBar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            background-color: #111;
            width: 100%;
            /* Tam ekranda da görünür kalması için gerekli */
        }

        .player-nav-btn {
            background: #222;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 10px 25px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        #fullscreenBtn { 
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            border: 1px solid rgba(255,255,255,0.2); 
            color: #fff; 
            padding: 14px 40px;
            font-size: 17px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="player-page">
        <div class="player-content-wrapper">
            <aside class="player-sidebar">
                <div class="channels-sidebar-list" id="channelsSidebarList"></div>
            </aside>

            <main class="player-main">
                <div class="video-container-player" id="videoContainerPlayer">
                    <video id="videoPlayer" class="video-player" autoplay playsinline title="PlusTV"></video>
                    
                    <div id="videoControlsBar">
                        <button class="player-nav-btn" onclick="changeChannel(-1)"><span>I⏮</span> Geri</button>
                        <button class="player-nav-btn" id="fullscreenBtn" onclick="toggleFullscreen()"><span>⛶</span> Tam Ekran</button>
                        <button class="player-nav-btn" onclick="changeChannel(1)">İleri <span>⏭I</span></button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        function toggleFullscreen() {
            const playerElement = document.getElementById("videoContainerPlayer");
            if (!document.fullscreenElement) {
                playerElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        // ... diğer fonksiyonlarınız ...
    </script>
</body>
</html>
