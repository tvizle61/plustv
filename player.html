<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="screen-orientation" content="auto">
    <title>PlusTV - Video Player</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        /* --- SIDEBAR GÜNCELLEMESİ (220px) --- */
        .player-sidebar {
            width: 220px; /* Genişlik 220px olarak ayarlandı */
            display: flex;
            flex-direction: column;
            background: #111;
            border-right: 1px solid #222;
            height: 100vh;
            flex-shrink: 0; /* İçeriğin sıkışmasını engeller */
        }

        .channels-sidebar-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 8px; /* Listeyi biraz daha daralttık */
        }

        /* --- KATEGORİLERİ SOLA YASLAMA --- */
        .player-categories-container {
            display: flex;
            justify-content: flex-start !important; 
            gap: 15px;
            padding: 15px;
            flex-wrap: wrap;
        }

        /* --- DİĞER STİLLER --- */
        #videoControlsBar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            background-color: #111;
            border-top: 1px solid #222;
            width: 100%;
        }

        .player-nav-btn {
            background: #222;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 10px 25px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            user-select: none;
        }

        .player-nav-btn:hover {
            background: #333;
            transform: scale(1.02);
        }

        #fullscreenBtn { 
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            border: 1px solid rgba(255,255,255,0.2); 
            color: #fff; 
            padding: 14px 40px;
            font-size: 17px;
            letter-spacing: 0.5px;
            font-weight: 500;
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        .player-content-wrapper {
            display: flex;
            flex-direction: row;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div class="player-page">
        <div class="player-content-wrapper">
            <aside class="player-sidebar">
                <div class="sidebar-header">
                    <button class="back-btn" id="backBtn" title="Ana Sayfaya Dön">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                        <span>Geri</span>
                    </button>
                    <h3 id="sidebarCategoryTitle">Kanallar</h3>
                    <button class="zoom-toggle-btn" id="zoomToggleBtn" title="Tam ekran">
                        <svg class="fullscreen-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                        </svg>
                    </button>
                </div>
                
                <div class="sidebar-tabs">
                    <button class="tab-btn active" data-tab="channels">Kanallar</button>
                    <button class="tab-btn" data-tab="favorites">⭐ Favoriler</button>
                </div>
                
                <div class="channels-sidebar-list" id="channelsSidebarList">
                </div>
            </aside>

            <main class="player-main">
                <section class="player-categories-section">
                    <div class="player-categories-container">
                        <div class="category-card" data-category="all">
                            <div class="category-icon">📺</div>
                            <div class="category-name">Tümü</div>
                        </div>
                    </div>
                </section>

                <div class="video-container-player" id="videoContainerPlayer">
                    <div class="video-placeholder-player" id="videoPlaceholderPlayer">
                        <div class="placeholder-content">
                            <div class="placeholder-icon">📺</div>
                            <h2>Bir Kanal Seçin</h2>
                            <p>Sol taraftaki listeden bir kanal seçin</p>
                           
                            <p class="brand-name">61 BYD 61 </p>
                        </div>
                    </div>
                    <div class="loading-overlay" id="loadingPlayer">
                        <div class="spinner"></div>
                        <p>Yükleniyor...</p>
                    </div>
                    <video id="videoPlayer" class="video-player" autoplay playsinline title="PlusTV"></video>
                    <iframe id="iframePlayer" class="iframe-player" frameborder="0" allowfullscreen allow="autoplay; fullscreen; xr-spatial-tracking; encrypted-media; clipboard-write" title="PlusTV" style="display: none;"></iframe>
                </div>

                <div id="videoControlsBar">
                    <button class="player-nav-btn" onclick="changeChannel(-1)">
                        <span>I⏮</span> Geri
                    </button>
                    
                    <button class="player-nav-btn" id="fullscreenBtn" onclick="toggleFullscreen()">
                        <span>⛶</span> Tam Ekran
                    </button>
                    
                    <button class="player-nav-btn" onclick="changeChannel(1)">
                        İleri <span>⏭I</span>
                    </button>
                </div>
            </main>
        </div>
    </div>

    <script src="player.js"></script>
    <script>
        function toggleFullscreen() {
            const playerElement = document.getElementById("videoContainerPlayer");
            if (!playerElement) return;
            if (!document.fullscreenElement) {
                playerElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function changeChannel(direction) {
            const listContainer = document.getElementById('channelsSidebarList');
            if (!listContainer) return;
            const channels = Array.from(listContainer.children);
            if (channels.length === 0) return;
            let currentIndex = channels.findIndex(ch => ch.classList.contains('active'));
            let nextIndex = currentIndex + direction;
            if (nextIndex >= channels.length) nextIndex = 0;
            else if (nextIndex < 0) nextIndex = channels.length - 1;
            const targetChannel = channels[nextIndex];
            if (targetChannel) {
                targetChannel.click();
                targetChannel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }
    </script>
</body>
</html>
