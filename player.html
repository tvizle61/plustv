<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="screen-orientation" content="auto">
    <title>PlusTV - Video Player</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        /* --- SIDEBAR AYARLARI (220px) --- */
        .player-sidebar {
            width: 220px;
            display: flex;
            flex-direction: column;
            background: #111;
            border-right: 1px solid #222;
            height: 100vh;
            flex-shrink: 0;
        }

        .channels-sidebar-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 6px;
        }

        /* --- KANAL LİSTESİ (BAYAĞI KÜÇÜLTÜLMÜŞ MİNİ BOYUT) --- */
        #channelsSidebarList > * {
            padding: 4px 6px !important;          /* İç boşlukları minimuma indirdik */
            margin-bottom: 3px !important;        /* Kanalların arasındaki boşluğu daralttık */
            min-height: 32px !important;          /* Yüksekliği 40px'ten 32px'e çekerek bayağı ince yaptık */
            max-height: 32px !important;
            border-radius: 4px !important;
            display: flex !important;
            align-items: center !important;
            gap: 6px !important;                  /* Logo ve yazı arasındaki mesafeyi daralttık */
        }

        /* Kanal Logoları (Küçültüldü) */
        #channelsSidebarList > * img,
        #channelsSidebarList > * .channel-logo,
        #channelsSidebarList > * [class*="logo"] {
            width: 20px !important;               /* Logoları 26px'ten 20px'e düşürdük */
            height: 20px !important;
            min-width: 20px !important;
            border-radius: 3px !important;
            object-fit: contain !important;
        }

        /* Kanal İsimleri (Küçültüldü) */
        #channelsSidebarList > * .channel-name,
        #channelsSidebarList > * h4,
        #channelsSidebarList > * span,
        #channelsSidebarList > * div {
            font-size: 10px !important;           /* Yazı boyutunu 11px'ten 10px'e indirdik */
            font-weight: 500 !important;
            line-height: 1.2 !important;
            white-space: nowrap !important;       /* Tek satıra zorlayıp taşmayı önledik */
            overflow: hidden !important;
            text-overflow: ellipsis !important;   /* Çok uzun isimlerin sonuna üç nokta koyar */
        }

       /* Alt Kategori / Alt Yazı Kısmı */
        #channelsSidebarList > * p,
        #channelsSidebarList > * small,
        #channelsSidebarList > * .channel-category {
            font-size: 8px !important;            /* Kategori yazılarını iyice minik yaptık */
            opacity: 0.6;
            margin: 0 !important;
            display: block !important;
        }

        /* Favori Yıldız Butonu */
        #channelsSidebarList > * .fav-btn,
        #channelsSidebarList > * .star-icon,
        #channelsSidebarList > * svg {
            transform: scale(0.75) !important;    /* Yıldız ikonunu biraz daha küçülttük */
            margin-left: auto !important;         /* En sağa yaslanmasını garantiledik */
        }
        /* --- ÜST KATEGORİ SECTİON VE CONTAINER AYARLARI --- */
        .player-categories-section {
            background: #111; 
            border-bottom: 1px solid #222;
            width: 100%;
        }

        .player-categories-container {
            display: flex;
            justify-content: flex-start !important; 
            gap: 5px !important;             /* Butonlar arası boşluk daraltıldı */
            padding: 5px 10px !important;    /* Üst bar yüksekliği buton boyutuyla dengelendi */
            flex-wrap: nowrap !important;    
            overflow-x: auto;                
        }

      /* --- KATEGORİ BUTONLARI DÜZELTME (DİKEY VE ESNEK) --- */
        
        /* 1. Genişliği kilitler, yüksekliği içeriğe göre esnek bırakır (Ezilmeyi önler) */
        .player-categories-container div.category-card,
        .player-categories-container [class*="category"],
        .player-categories-container .active,
        .player-categories-container .selected {
            width: 40px !important;
            max-width: 40px !important;
            min-width: 40px !important;
            height: auto !important;          /* Sabit yükseklik kaldırıldı, ezilme kesinlikle biter */
            max-height: none !important;
            min-height: auto !important;
            padding: 4px 1px !important;       /* Üst ve alttan sağlıklı bir iç boşluk */
            box-sizing: border-box !important;
            border-radius: 4px !important;
            
            display: flex !important;
            flex-direction: column !important; /* İkon üstte, yazı altta (orijinal düzen) */
            align-items: center !important;
            justify-content: center !important;
            gap: 2px !important;               /* İkon ile yazı arasındaki dikey boşluk */
            flex-shrink: 0 !important;
            overflow: visible !important;      /* Yazıların taşarak görünmesini sağlar */
        }

        /* 2. İkon Boyut Sabitleme */
        .category-icon,
        [class*="category-icon"] {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            width: 15px !important;
            height: 15px !important;
            margin: 0 !important;
            padding: 0 !important;
        }

        /* İkon içindeki emoji veya görseller */
        .category-icon img,
        .category-icon svg,
        .category-icon i,
        .category-icon span {
            width: 15px !important;
            height: 15px !important;
            font-size: 15px !important;
            object-fit: contain !important;
            line-height: 1 !important;
        }

        /* 3. Yazı Boyutu ve Görünürlük Kalkanı */
        .player-categories-container .category-card .category-name,
        .player-categories-container [class*="category"] [class*="name"],
        .category-name {
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            
            font-size: 7px !important;         /* Küçük ama okunabilir yazı boyutu */
            font-weight: 500 !important;
            color: #ffffff !important;         /* Yazı rengini beyaza zorlar */
            white-space: nowrap !important;   
            line-height: 1 !important;       
            margin: 0 !important;   
            padding: 0 !important;
            text-align: center !important;
        }
        /* --- VİDEO ALANI ANA AYARLARI --- */
        .player-main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            height: 100vh;
        }

        #videoContainerPlayer {
            position: relative !important;
            overflow: hidden;
            flex-grow: 1;
            background: #000;
        }

        /* --- DEĞİŞTİRİLEN ALAN: SOLA YANAŞIK KONTROL BAR --- */
        #videoControlsBar {
            position: absolute !important;
            bottom: 0 !important;
            left: 0 !important;
            width: 100% !important;
            display: flex !important;
            justify-content: flex-start !important; /* Ortadan Sola yanaştırıldı */
            align-items: center !important;
            gap: 8px !important;
            padding: 6px 15px !important; /* Butonların sol kenara sıfırlanmaması için sol boşluk eklendi */
            background: rgba(17, 17, 17, 0.75) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.05) !important;
            z-index: 999999 !important;
            box-sizing: border-box !important;
        }

        /* --- MİNİ BUTONLAR --- */
        .player-nav-btn {
            background: #222;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.3s ease;
            user-select: none;
        }

        .player-nav-btn:hover {
            background: #333;
            transform: scale(1.02);
        }

        /* --- MİNİ TAM EKRAN BUTONU --- */
        #fullscreenBtn { 
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            border: 1px solid rgba(255,255,255,0.2); 
            color: #fff; 
            padding: 5px 16px;
            font-size: 11px;
            letter-spacing: 0.3px;
            font-weight: 500;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }

        .player-content-wrapper {
            display: flex;
            flex-direction: row;
            height: 100vh;
        }

        /* =======================================================
           YENİ EKLENEN KISIM: SAĞ/SOL SİYAH BOŞLUKLARI YOK ETME
           ======================================================= */
        .video-player, 
        .iframe-player {
            width: 100% !important;
            height: 100% !important;
            object-fit: fill !important; /* Videoyu ekrana tam sığdırır, boşlukları siler */
        }
    </style>
</head>
<body>
