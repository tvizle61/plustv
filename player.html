<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlusTV - Video Player</title>
    <style>
        /* CSS RESET VE ANA YAPI */
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        .player-page { display: flex; height: 100vh; width: 100vw; }
        
        /* SIDEBAR (Sabit 220px) */
        .player-sidebar {
            width: 220px;
            flex-shrink: 0;
            background: #111;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #222;
            height: 100vh;
        }

        .channels-sidebar-list { flex-grow: 1; overflow-y: auto; padding: 10px; }

        /* MAIN ALAN */
        .player-main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        /* VİDEO KAPSAYICISI */
        .video-container-player {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .video-player { width: 100%; height: 100%; object-fit: contain; }

        /* KONTROL ÇUBUĞU (Videonun altında sabit) */
        #videoControlsBar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #111;
            border-top: 1px solid #222;
        }

        /* KÜÇÜK BUTONLAR */
        .player-nav-btn {
            background: #222;
            border: 1px solid #333;
            color: #fff;
            padding: 6px 15px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        #fullscreenBtn {
            background: #007bff;
            border: none;
        }
    </style>
</head>
<body>
    <div class="player-page">
        <aside class="player-sidebar">
            <div class="channels-sidebar-list" id="channelsSidebarList">
                </div>
        </aside>

        <main class="player-main">
            <div class="video-container-player" id="videoContainerPlayer">
                <video id="videoPlayer" class="video-player" autoplay playsinline></video>
                
                <div id="videoControlsBar">
                    <button class="player-nav-btn" onclick="changeChannel(-1)">⏮ Geri</button>
                    <button class="player-nav-btn" id="fullscreenBtn" onclick="toggleFullscreen()">⛶ Tam Ekran</button>
                    <button class="player-nav-btn" onclick="changeChannel(1)">İleri ⏭</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        function toggleFullscreen() {
            const el = document.getElementById("videoContainerPlayer");
            if (!document.fullscreenElement) {
                el.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }

        function changeChannel(direction) {
            const list = document.getElementById('channelsSidebarList');
            const items = Array.from(list.children);
            if (items.length === 0) return;
            let idx = items.findIndex(i => i.classList.contains('active'));
            if (idx === -1) idx = 0;
            let next = (idx + direction + items.length) % items.length;
            items[next].click();
        }
    </script>
</body>
</html>
